services:
  traefik:
    image: traefik:v3.1
    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik.rule=Host(`traefik.localhost`)
      - traefik.http.routers.traefik.entrypoints=web
      - traefik.http.routers.traefik.service=api@internal

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: soil
      POSTGRES_USER: soil
      POSTGRES_PASSWORD: soil
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soil -d soil"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "56379:6379"

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "51883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 33001
      FRONTEND_URL: http://localhost
      DATABASE_URL: postgresql://soil:soil@postgres:5432/soil?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: soil-secret
      JWT_EXPIRES_IN: 12h
      MQTT_URL: mqtt://mosquitto:1883
      MQTT_TOPIC_PATTERN: pivots/+/telemetry
      MQTT_COMMAND_TOPIC: pivots/{code}/commands
      MQTT_LOCAL_ECHO_COMMANDS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mosquitto:
        condition: service_started
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`api.localhost`)
      - traefik.http.routers.api.entrypoints=web
      - traefik.http.services.api.loadbalancer.server.port=33001

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_DEMO_EMAIL: admin@soil.local
        NEXT_PUBLIC_DEMO_PASSWORD: soil123456
    depends_on:
      - api
    labels:
      - traefik.enable=true
      - traefik.http.routers.web.rule=Host(`localhost`)
      - traefik.http.routers.web.entrypoints=web
      - traefik.http.services.web.loadbalancer.server.port=3000

volumes:
  postgres_data:
