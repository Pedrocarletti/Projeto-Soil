services:
  caddy:
    image: caddy:2
    environment:
      API_DOMAIN: ${API_DOMAIN:?API_DOMAIN is required}
      ACME_EMAIL: ${ACME_EMAIL:?ACME_EMAIL is required}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/api.Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-soil}
      POSTGRES_USER: ${POSTGRES_USER:-soil}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_public_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-soil} -d ${POSTGRES_DB:-soil}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 33001
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      DATABASE_URL: postgresql://${POSTGRES_USER:-soil}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-soil}?schema=public
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-12h}
      MQTT_URL: ${MQTT_URL:-mqtt://mosquitto:1883}
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      MQTT_TOPIC_PATTERN: ${MQTT_TOPIC_PATTERN:-pivots/+/telemetry}
      MQTT_COMMAND_TOPIC: ${MQTT_COMMAND_TOPIC:-pivots/{code}/commands}
      MQTT_LOCAL_ECHO_COMMANDS: ${MQTT_LOCAL_ECHO_COMMANDS:-true}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Administrador Soil}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:?SEED_ADMIN_EMAIL is required}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:?SEED_ADMIN_PASSWORD is required}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mosquitto:
        condition: service_started
    restart: unless-stopped

volumes:
  caddy_config:
  caddy_data:
  postgres_public_data:
